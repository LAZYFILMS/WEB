<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAZY FILMS</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="https://use.typekit.net/zul3tcf.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'stratos', sans-serif;
            background: #000;
            color: #fff;
            cursor: none;
            overflow: hidden;
        }

        /* Full-screen background */
        .bg {
            position: fixed;
            inset: 0;
            background-image: url('nathan.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        /* Button stack */
        .nav {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .nav-btn {
            font-family: 'Lucida Console', Courier, monospace;
            font-weight: normal;
            font-size: 18px;
            line-height: 2;
            color: #fff;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0;
            cursor: none;
            text-align: center;
            letter-spacing: 0;
            text-transform: none;
            transition: opacity 0.15s ease;
        }

        .nav-btn:hover {
            opacity: 0.5;
        }

        /* Custom cursor */
        #cursor {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            top: 0;
            left: 0;
        }

        #cursor-circle {
            width: 40px;
            height: 40px;
            margin-top: -20px;
            margin-left: -20px;
            border-radius: 50%;
            border: 2px solid #fff;
            opacity: 0.6;
            transition: all 0.15s ease;
        }

        #cursor-circle.hovering {
            width: 16px;
            height: 16px;
            margin-top: -8px;
            margin-left: -8px;
            opacity: 1;
            background: #fff;
        }

        /* Write to us overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .popup {
            width: 90%;
            max-width: 520px;
            background: #fff;
            color: #000;
            padding: 36px 36px 30px;
            position: relative;
        }

        .popup-title {
            font-family: "stratos", sans-serif;
            font-weight: 900;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .popup-sub {
            font-family: "stratos", sans-serif;
            font-size: 14px;
            color: #555;
            margin-bottom: 22px;
        }

        .popup textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            border: 1.5px solid #ccc;
            padding: 12px 14px;
            font-family: "stratos", sans-serif;
            font-size: 15px;
            color: #000;
            outline: none;
            margin-bottom: 8px;
            transition: border-color 0.15s;
        }

        .popup textarea:focus {
            border-color: #000;
        }

        .popup input[type="email"] {
            width: 100%;
            border: 1.5px solid #ccc;
            padding: 11px 14px;
            font-family: "stratos", sans-serif;
            font-size: 15px;
            color: #000;
            outline: none;
            margin-bottom: 18px;
            transition: border-color 0.15s;
        }

        .popup input[type="email"]:focus {
            border-color: #000;
        }

        .popup-send {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 13px;
            font-family: "stratos", sans-serif;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .popup-send:hover {
            background: #333;
        }

        .popup-close {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 22px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.15s;
        }

        .popup-close:hover {
            color: #000;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .nav-btn {
                font-size: 16px;
            }

            #cursor {
                display: none;
            }

            body {
                cursor: auto;
            }

            .nav-btn {
                cursor: pointer;
            }

            .popup {
                padding: 28px 22px 24px;
            }

            .popup-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div id="cursor">
        <div id="cursor-circle"></div>
    </div>

    <div class="bg"></div>

    <nav class="nav">
        <a href="store/index.html" class="nav-btn">BUY FILM</a>
        <a href="https://www.lazyfilms.in/labs" class="nav-btn">DEVELOP FILM</a>
        <button class="nav-btn" id="makeFilmsBtn">MAKE FILMS ON FILMS</button>
    </nav>

    <!-- Write to us popup -->
    <div class="overlay" id="overlay">
        <div class="popup">
            <button class="popup-close" id="popupClose">&times;</button>
            <div class="popup-title">Write to us</div>
            <div class="popup-sub">Tell us what you have in mind</div>
            <form id="writeForm" action="https://formsubmit.co/sarang@lazyfilms.in" method="POST" target="_blank">
                <input type="hidden" name="_subject" value="Make Films On Films — Inquiry">
                <input type="hidden" name="_captcha" value="false">
                <input
                    type="email"
                    name="email"
                    placeholder="Your email"
                    required
                >
                <textarea
                    name="message"
                    placeholder="What do you have in mind?"
                    required
                ></textarea>
                <button type="submit" class="popup-send">Send →</button>
            </form>
        </div>
    </div>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        const circle = document.getElementById('cursor-circle');

        document.addEventListener('mousemove', e => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        document.querySelectorAll('.nav-btn, .popup-close, .popup-send').forEach(el => {
            el.addEventListener('mouseenter', () => circle.classList.add('hovering'));
            el.addEventListener('mouseleave', () => circle.classList.remove('hovering'));
        });

        // Popup
        const overlay   = document.getElementById('overlay');
        const makeBtn   = document.getElementById('makeFilmsBtn');
        const closeBtn  = document.getElementById('popupClose');
        const writeForm = document.getElementById('writeForm');

        makeBtn.addEventListener('click', () => overlay.classList.add('show'));
        closeBtn.addEventListener('click', () => overlay.classList.remove('show'));
        overlay.addEventListener('click', e => {
            if (e.target === overlay) overlay.classList.remove('show');
        });

        writeForm.addEventListener('submit', () => {
            setTimeout(() => {
                overlay.classList.remove('show');
                writeForm.reset();
            }, 400);
        });
    </script>
</body>
</html>
